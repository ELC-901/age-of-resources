name: Build Age of Resources EXE

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:  # позволяет запускать вручную

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build EXE with PyInstaller
      run: |
        # Важно: флаг --add-data добавляет папку assets внутрь EXE
        pyinstaller --onefile --name "AgeOfResources" --add-data "assets;assets" run.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AgeOfResources
        path: dist/AgeOfResources.exe
